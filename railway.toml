# Railway deployment configuration for Hermes Agent — Telegram Gateway
#
# See: https://docs.railway.app/reference/config-as-code
#
# Usage:
#   1. railway login
#   2. railway link   (or railway init)
#   3. Set required environment variables (see .env.telegram.example)
#   4. git push origin main  → Railway auto-deploys

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "python -m src.api.telegram_gateway"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environments.production.deploy]
numReplicas = 1
